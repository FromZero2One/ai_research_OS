version: "3.9"

services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  qdrant:
    extends:
      file: docker-compose.yml
      service: qdrant

  redis:
    extends:
      file: docker-compose.yml
      service: redis

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: airesearch-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://airesearch:airesearch_dev@postgres:5432/airesearch
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/../data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: node:22-alpine
    container_name: airesearch-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ../frontend:/app
    depends_on:
      - backend
